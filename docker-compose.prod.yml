# Production stack for a single VM (e.g. Oracle Cloud A1) — Caddy terminates TLS,
# only ports 80/443 are exposed. Postgres is hosted on Neon (managed, free tier),
# so there is no database container here.
#
#   docker compose -f docker-compose.prod.yml --env-file .env pull
#   docker compose -f docker-compose.prod.yml --env-file .env up -d
#
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/muhammadasif2017/job-tracker-backend:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      # Neon connection string (with ?sslmode=require). Used by the app and by
      # `prisma migrate deploy` on startup.
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL}
      # Public base URL of this backend — used to build OAuth callback URLs.
      BACKEND_URL: ${BACKEND_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-placeholder}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-placeholder}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-placeholder}
      GROQ_API_KEY: ${GROQ_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
    depends_on:
      redis:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      BACKEND_DOMAIN: ${BACKEND_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:
