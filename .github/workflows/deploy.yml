name: Deploy

# The image build happens on the VM itself — that VM is Arm64, so building there
# avoids cross-architecture image issues.
#
# DISABLED until the VM is ready: only manual dispatch is enabled. Once the VM is
# provisioned and the SSH secrets are set, re-enable auto-deploy by uncommenting:
#   push:
#     branches: [main]
on:
  workflow_dispatch:

# Never let two deploys run at once; let an in-flight one finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 30m # A1 builds can be slow
          script: |
            set -e
            cd ${{ vars.DEPLOY_PATH || '~/job-tracker' }}
            git pull --ff-only origin main
            docker compose -f docker-compose.prod.yml --env-file .env up -d --build
            docker image prune -f
